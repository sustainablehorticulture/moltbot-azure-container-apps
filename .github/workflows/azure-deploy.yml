name: Deploy Red Dog to Azure Container Apps

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: cr5eqmkn3bypkyu.azurecr.io
  IMAGE_NAME: reddog
  RESOURCE_GROUP: BotRedDog
  CONTAINER_APP_NAME: clawdbot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        
    - name: Build and push container image
      run: |
        az acr build --registry ${{ env.REGISTRY }} --image ${{ env.IMAGE_NAME }}:latest --file Dockerfile .
        
    - name: Set Container App secrets
      env:
        TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
        TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
        ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
        BURRO_API_BASE: ${{ secrets.BURRO_API_BASE }}
        BURRO_BEARER_TOKEN: ${{ secrets.BURRO_BEARER_TOKEN }}
        PLANETARY_COMPUTER_API_KEY: ${{ secrets.PLANETARY_COMPUTER_API_KEY }}
        SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
      run: |
        SECRETS=""
        [ -n "$TWILIO_ACCOUNT_SID" ]        && SECRETS="$SECRETS twilio-account-sid=\"$TWILIO_ACCOUNT_SID\""
        [ -n "$TWILIO_AUTH_TOKEN" ]          && SECRETS="$SECRETS twilio-auth-token=\"$TWILIO_AUTH_TOKEN\""
        [ -n "$TWILIO_PHONE_NUMBER" ]        && SECRETS="$SECRETS twilio-phone-number=\"$TWILIO_PHONE_NUMBER\""
        [ -n "$ALERT_PHONE_NUMBER" ]         && SECRETS="$SECRETS alert-phone-number=\"$ALERT_PHONE_NUMBER\""
        [ -n "$BURRO_API_BASE" ]             && SECRETS="$SECRETS burro-api-base=\"$BURRO_API_BASE\""
        [ -n "$BURRO_BEARER_TOKEN" ]         && SECRETS="$SECRETS burro-bearer-token=\"$BURRO_BEARER_TOKEN\""
        [ -n "$PLANETARY_COMPUTER_API_KEY" ] && SECRETS="$SECRETS planetary-computer-api-key=\"$PLANETARY_COMPUTER_API_KEY\""
        [ -n "$SLACK_SIGNING_SECRET" ]       && SECRETS="$SECRETS slack-signing-secret=\"$SLACK_SIGNING_SECRET\""
        if [ -n "$SECRETS" ]; then
          eval az containerapp secret set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --secrets $SECRETS
        else
          echo "No secrets to set — skipping"
        fi

    - name: Deploy to Azure Container Apps
      env:
        TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
        TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
        ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
        BURRO_API_BASE: ${{ secrets.BURRO_API_BASE }}
        BURRO_BEARER_TOKEN: ${{ secrets.BURRO_BEARER_TOKEN }}
        PLANETARY_COMPUTER_API_KEY: ${{ secrets.PLANETARY_COMPUTER_API_KEY }}
        SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
      run: |
        ENV_VARS=""
        [ -n "$TWILIO_ACCOUNT_SID" ]        && ENV_VARS="$ENV_VARS TWILIO_ACCOUNT_SID=secretref:twilio-account-sid"
        [ -n "$TWILIO_AUTH_TOKEN" ]          && ENV_VARS="$ENV_VARS TWILIO_AUTH_TOKEN=secretref:twilio-auth-token"
        [ -n "$TWILIO_PHONE_NUMBER" ]        && ENV_VARS="$ENV_VARS TWILIO_PHONE_NUMBER=secretref:twilio-phone-number"
        [ -n "$ALERT_PHONE_NUMBER" ]         && ENV_VARS="$ENV_VARS ALERT_PHONE_NUMBER=secretref:alert-phone-number"
        [ -n "$BURRO_API_BASE" ]             && ENV_VARS="$ENV_VARS BURRO_API_BASE=secretref:burro-api-base"
        [ -n "$BURRO_BEARER_TOKEN" ]         && ENV_VARS="$ENV_VARS BURRO_BEARER_TOKEN=secretref:burro-bearer-token"
        [ -n "$PLANETARY_COMPUTER_API_KEY" ] && ENV_VARS="$ENV_VARS PLANETARY_COMPUTER_API_KEY=secretref:planetary-computer-api-key"
        [ -n "$SLACK_SIGNING_SECRET" ]       && ENV_VARS="$ENV_VARS SLACK_SIGNING_SECRET=secretref:slack-signing-secret"
        eval az containerapp update \
          --name ${{ env.CONTAINER_APP_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
          ${ENV_VARS:+--set-env-vars $ENV_VARS}
