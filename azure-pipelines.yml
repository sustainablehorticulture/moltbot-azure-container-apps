# Azure Pipelines for Red Dog Container App Deployment
# Deploys Red Dog to Azure Container Apps

trigger:
  branches:
    include:
    - main
    - master

# Use self-hosted agent pool to bypass parallelism requirement
# Change to 'vmImage: ubuntu-latest' if you have Microsoft-hosted parallelism
pool:
  name: 'Default'  # Self-hosted agent pool
  # vmImage: 'ubuntu-latest'  # Uncomment this and comment above if using Microsoft-hosted agents

variables:
  REGISTRY: 'cr5eqmkn3bypkyu.azurecr.io'
  IMAGE_NAME: 'reddog'
  RESOURCE_GROUP: 'BotRedDog'
  CONTAINER_APP_NAME: 'clawdbot'
  AZURE_SUBSCRIPTION: 'eaec7538-5ab2-4d23-9903-6ff6ebbca7b0'

stages:
- stage: Build
  displayName: 'Build and Push Container Image'
  jobs:
  - job: BuildJob
    displayName: 'Build Red Dog Container'
    steps:
    - task: AzureCLI@2
      displayName: 'Azure Login'
      inputs:
        azureSubscription: 'Azure-RedDog-ServiceConnection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Logged in to Azure"
          az account show

    - task: AzureCLI@2
      displayName: 'Build and Push Container Image'
      inputs:
        azureSubscription: 'Azure-RedDog-ServiceConnection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Building Red Dog container image..."
          az acr build \
            --registry $(REGISTRY) \
            --image $(IMAGE_NAME):latest \
            --image $(IMAGE_NAME):$(Build.BuildId) \
            --file Dockerfile \
            .
          echo "Container image built and pushed successfully"

- stage: Deploy
  displayName: 'Deploy to Azure Container Apps'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy Red Dog'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          - task: AzureCLI@2
            displayName: 'Deploy to Container Apps'
            inputs:
              azureSubscription: 'Azure-RedDog-ServiceConnection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Deploying Red Dog to Azure Container Apps..."
                az containerapp update \
                  --name $(CONTAINER_APP_NAME) \
                  --resource-group $(RESOURCE_GROUP) \
                  --image $(REGISTRY)/$(IMAGE_NAME):latest
                echo "Deployment completed successfully"

          - task: AzureCLI@2
            displayName: 'Verify Deployment'
            inputs:
              azureSubscription: 'Azure-RedDog-ServiceConnection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Verifying deployment..."
                az containerapp revision list \
                  --name $(CONTAINER_APP_NAME) \
                  --resource-group $(RESOURCE_GROUP) \
                  --query "[0].{Name:name, Active:properties.active, Created:properties.createdTime}" \
                  --output table
                echo "Deployment verification complete"
