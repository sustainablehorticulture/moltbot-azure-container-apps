<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Dog Farm Dashboard – NDVI & Burro Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 300px; border-radius: 0.5rem; }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="min-h-screen p-4 md:p-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-green-700">🌱 Red Dog Farm Dashboard</h1>
            <p class="text-gray-600">NDVI from Sentinel‑2 and Burro automated unit control</p>
        </header>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- NDVI Panel -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <span class="mr-2">🌱</span> Latest NDVI
                </h2>
                <div class="space-y-4">
                    <div class="flex gap-2">
                        <input type="number" id="lat" placeholder="Latitude" step="any" class="flex-1 px-3 py-2 border rounded" value="-29.80937">
                        <input type="number" id="lng" placeholder="Longitude" step="any" class="flex-1 px-3 py-2 border rounded" value="152.59111">
                        <button onclick="fetchNdvi()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Fetch NDVI</button>
                    </div>
                    <div id="ndvi-result" class="hidden">
                        <img id="ndvi-img" src="" alt="NDVI" class="w-full rounded border" />
                        <div id="ndvi-meta" class="mt-2 text-sm text-gray-600"></div>
                    </div>
                    <div id="ndvi-loading" class="hidden">
                        <div class="loader border-4 border-gray-200 rounded-full w-8 h-8 mx-auto"></div>
                        <p class="text-center mt-2 text-gray-500">Fetching latest Sentinel‑2 NDVI...</p>
                    </div>
                </div>
            </div>

            <!-- Burro Control Panel -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <span class="mr-2">🤖</span> Burro Control
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Robot Serial Number</label>
                        <input type="text" id="robot" placeholder="e.g. BURRO-001" class="w-full px-3 py-2 border rounded" value="BURRO-001">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Mission</label>
                        <input type="text" id="mission" placeholder="ndvi-guided-patrol" class="w-full px-3 py-2 border rounded" value="ndvi-guided-patrol">
                    </div>
                    <button onclick="launchBurro()" class="w-full px-4 py-3 bg-green-600 text-white rounded hover:bg-green-700 font-semibold">
                        🚀 Launch Burro
                    </button>
                    <div id="burro-result" class="hidden"></div>
                    <div id="burro-loading" class="hidden">
                        <div class="loader border-4 border-gray-200 rounded-full w-8 h-8 mx-auto"></div>
                        <p class="text-center mt-2 text-gray-500">Launching burro...</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Map -->
        <section class="mt-8 bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-semibold mb-4">📍 Farm Location</h2>
            <div id="map"></div>
        </section>

        <!-- Chat Bubble -->
        <div id="chat-bubble" class="fixed bottom-4 right-4 w-80 bg-white rounded-lg shadow-2xl border border-gray-200 flex flex-col" style="height: 480px;">
            <div class="bg-green-600 text-white px-4 py-3 rounded-t-lg flex justify-between items-center">
                <span class="font-semibold">💬 Red Dog Farm Chat</span>
                <button onclick="toggleChat()" class="text-white hover:text-gray-200">✕</button>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-2 text-sm" style="min-height: 320px; max-height: 320px;">
                <div class="text-gray-500 italic">Type commands like:<br/>• ndvi -29.80937 152.59111<br/>• launch-burro BURRO-001 -29.80937 152.59111</div>
            </div>
            <div class="border-t p-3 flex gap-2">
                <input type="text" id="chat-input" placeholder="Type a command..." class="flex-1 px-3 py-2 border rounded text-sm" onkeypress="if(event.key==='Enter') sendChatCommand()" />
                <button onclick="sendChatCommand()" class="px-3 py-2 bg-green-600 text-white rounded hover:bg-green-700 text-sm">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://clawdbot.happybush-1b235e08.australiasoutheast.azurecontainerapps.io';
        let map, marker;
        let latestNdvi = null;

        // Init map
        map = L.map('map').setView([-29.80937, 152.59111], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        marker = L.marker([-29.80937, 152.59111]).addTo(map);

        // Update map on input change
        function updateMap() {
            const lat = parseFloat(document.getElementById('lat').value);
            const lng = parseFloat(document.getElementById('lng').value);
            if (!isNaN(lat) && !isNaN(lng)) {
                map.setView([lat, lng], 14);
                marker.setLatLng([lat, lng]);
            }
        }
        document.getElementById('lat').addEventListener('change', updateMap);
        document.getElementById('lng').addEventListener('change', updateMap);

        async function fetchNdvi() {
            const lat = document.getElementById('lat').value;
            const lng = document.getElementById('lng').value;
            if (!lat || !lng) {
                alert('Enter latitude and longitude');
                return;
            }
            document.getElementById('ndvi-loading').classList.remove('hidden');
            document.getElementById('ndvi-result').classList.add('hidden');
            try {
                const res = await fetch(`${API_BASE}/api/farm/ndvi/latest?lat=${lat}&lng=${lng}&bufferKm=0.5`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                latestNdvi = data;
                document.getElementById('ndvi-img').src = data.ndviUrl;
                document.getElementById('ndvi-meta').innerHTML = `
                    <strong>Tile:</strong> ${data.tileId}<br>
                    <strong>Date:</strong> ${new Date(data.datetime).toLocaleDateString()}<br>
                    <strong>Cloud cover:</strong> ${(data.cloudCover * 100).toFixed(1)}%<br>
                    <a href="${data.ndviUrl}" target="_blank" class="text-blue-600 underline">View full NDVI</a>
                `;
                document.getElementById('ndvi-result').classList.remove('hidden');
            } catch (err) {
                alert('NDVI fetch failed: ' + err.message);
            } finally {
                document.getElementById('ndvi-loading').classList.add('hidden');
            }
        }

        async function launchBurro() {
            const robot = document.getElementById('robot').value;
            const mission = document.getElementById('mission').value;
            const lat = document.getElementById('lat').value;
            const lng = document.getElementById('lng').value;
            if (!robot || !lat || !lng) {
                alert('Fill robot, lat, and lng');
                return;
            }
            document.getElementById('burro-loading').classList.remove('hidden');
            document.getElementById('burro-result').classList.add('hidden');
            try {
                const payload = { robotSerialNumber: robot, lat, lng, missionName: mission };
                if (latestNdvi) payload.ndviContext = { tileId: latestNdvi.tileId, datetime: latestNdvi.datetime, ndviUrl: latestNdvi.ndviUrl };
                const res = await fetch(`${API_BASE}/api/farm/burro/launch`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                document.getElementById('burro-result').innerHTML = `
                    <div class="bg-green-50 border border-green-200 rounded p-4">
                        <h3 class="font-semibold text-green-800">🤖 Burro Launched!</h3>
                        <ul class="text-sm text-green-700 mt-2">
                            <li><strong>Robot:</strong> ${data.robotSerialNumber}</li>
                            <li><strong>Mission:</strong> ${data.missionName}</li>
                            <li><strong>Mission ID:</strong> ${data.missionId}</li>
                            <li><strong>Launch Point:</strong> ${data.launchPoint.lat}, ${data.launchPoint.lng}</li>
                            <li><strong>NDVI Context:</strong> ${data.ndviContext ? 'Attached' : 'None'}</li>
                            <li><strong>Launched:</strong> ${new Date(data.timestamp).toLocaleString()}</li>
                        </ul>
                    </div>
                `;
                document.getElementById('burro-result').classList.remove('hidden');
            } catch (err) {
                alert('Burro launch failed: ' + err.message);
            } finally {
                document.getElementById('burro-loading').classList.add('hidden');
            }
        }

        // Auto-fetch NDVI on load
        fetchNdvi();

        // Chat bubble functions
        function toggleChat() {
            const bubble = document.getElementById('chat-bubble');
            bubble.style.display = bubble.style.display === 'none' ? 'flex' : 'none';
        }

        function addChatMessage(sender, text, isError = false) {
            const messages = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `p-2 rounded ${sender === 'user' ? 'bg-blue-100 ml-auto max-w-[70%]' : isError ? 'bg-red-100 text-red-800' : 'bg-gray-100 max-w-[70%]'}`;
            msgDiv.innerHTML = `<strong>${sender === 'user' ? 'You' : 'Red Dog'}:</strong> ${text}`;
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        async function sendChatCommand() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            addChatMessage('user', text);
            input.value = '';
            const parts = text.toLowerCase().split(/\s+/);
            const cmd = parts[0];
            try {
                if (cmd === 'ndvi') {
                    if (parts.length < 3) throw new Error('Usage: ndvi <lat> <lng> [buffer]');
                    const lat = parseFloat(parts[1]);
                    const lng = parseFloat(parts[2]);
                    const buffer = parts[3] ? parseFloat(parts[3]) : 0.5;
                    if (isNaN(lat) || isNaN(lng)) throw new Error('Invalid lat/lng');
                    addChatMessage('bot', `Fetching NDVI for (${lat}, ${lng})...`);
                    const res = await fetch(`${API_BASE}/api/farm/ndvi/latest?lat=${lat}&lng=${lng}&bufferKm=${buffer}`);
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error);
                    const msg = `🌱 NDVI fetched!\n📅 ${new Date(data.datetime).toLocaleDateString()}\n☁️ Cloud: ${(data.cloudCover*100).toFixed(1)}%\n🔗 ${data.ndviUrl}`;
                    addChatMessage('bot', msg);
                } else if (cmd === 'launch-burro') {
                    if (parts.length < 4) throw new Error('Usage: launch-burro <robot> <lat> <lng> [mission]');
                    const robot = parts[1];
                    const lat = parseFloat(parts[2]);
                    const lng = parseFloat(parts[3]);
                    const mission = parts[4] || 'ndvi-guided-patrol';
                    if (isNaN(lat) || isNaN(lng)) throw new Error('Invalid lat/lng');
                    addChatMessage('bot', `Launching ${robot} at (${lat}, ${lng})...`);
                    const payload = { robotSerialNumber: robot, lat, lng, missionName: mission };
                    if (latestNdvi) payload.ndviContext = { tileId: latestNdvi.tileId, datetime: latestNdvi.datetime, ndviUrl: latestNdvi.ndviUrl };
                    const res = await fetch(`${API_BASE}/api/farm/burro/launch`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error);
                    const msg = `🤖 Burro launched!\n🔧 ${data.robotSerialNumber}\n🎯 ${data.missionName}\n🆔 ${data.missionId}\n📍 ${data.launchPoint.lat}, ${data.launchPoint.lng}\n🌱 NDVI: ${data.ndviContext ? 'Attached' : 'None'}`;
                    addChatMessage('bot', msg);
                } else {
                    addChatMessage('bot', `Unknown command: ${cmd}. Try: ndvi <lat> <lng> or launch-burro <robot> <lat> <lng>`, true);
                }
            } catch (err) {
                addChatMessage('bot', err.message, true);
            }
        }
    </script>
</body>
</html>
